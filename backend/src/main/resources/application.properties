# NeuralMail v9 ? Spring Boot Configuration

# Server
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/neuralmail}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:1318}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Groq AI
groq.api.url=https://api.groq.com/openai/v1
groq.api.key=${GROQ_API_KEY:dummy}
groq.model=llama-3.3-70b-versatile

# JWT
app.jwt.secret=${JWT_SECRET:NeuralMailSuperSecretKeyMustBe256BitsLongForHS256AlgorithmSecurity2025!}
app.jwt.expiration-ms=86400000

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:dummy@gmail.com}
spring.mail.password=${MAIL_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME:dummy@gmail.com}
app.frontend.url=${FRONTEND_URL:http://localhost:8080}

# Rate limiting
app.rate.limit.requests-per-day=50

# Logging
logging.level.com.email_writer=INFO
logging.level.org.springframework.security=WARN
